<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊索寓言互動故事</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{max-width:700px;margin:auto;padding:16px}
.card{background:white;border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.1);line-height:1.8}
button{padding:10px 16px;border:none;border-radius:8px;background:#4CAF50;color:white;margin:5px}
.option{display:block;margin:8px 0;padding:10px;background:#eee;border-radius:8px;cursor:pointer}
.progress{margin-bottom:10px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
<div style="text-align:center">
<button onclick="prevStory()">上一題</button>
<button onclick="nextStory()">下一題</button>
</div>
</div>

<script>
const stories = [
{title:"1. 狐狸與葡萄",text:"一個炎熱的午後，一隻飢餓的狐狸在森林裡四處尋找食物。牠已經走了很久，卻什麼也沒找到，肚子餓得發出聲音。就在牠幾乎要放棄時，忽然看見一座葡萄架，上面掛滿了一串串成熟的葡萄。葡萄晶瑩剔透，看起來香甜多汁。狐狸興奮地跳起來想摘，但葡萄太高，牠怎麼跳都碰不到。牠不斷嘗試，甚至換不同位置，但仍然失敗。最後牠累得筋疲力盡，只好放棄，並自我安慰地說：那些葡萄一定是酸的。",q:"狐狸為什麼這樣說？",options:["真的酸","找藉口","不餓"],answer:1,moral:"寓意：得不到的東西，人往往會貶低它。"},

{title:"2. 龜兔賽跑",text:"兔子總是嘲笑烏龜動作慢，認為自己無人能敵。烏龜忍不住提出比賽。比賽開始後，兔子飛快地跑遠，看到烏龜還在後面，便放心地睡覺。烏龜則穩定前進，從不停止。時間一分一秒過去，烏龜一步步接近終點，甚至超過了熟睡的兔子。當兔子醒來後急忙追趕，卻已經來不及。最後烏龜贏得比賽。",q:"烏龜為何贏？",options:["運氣","堅持","作弊"],answer:1,moral:"寓意：持之以恆比天賦更重要。"},

{title:"3. 狼來了",text:"牧童在山上放羊，覺得無聊，便多次大喊狼來了，欺騙村民。村民一次次上山幫忙，卻發現是惡作劇。久而久之，大家不再相信他。後來真的有狼出現，牧童再怎麼呼救也沒人理會，羊群被吃光。",q:"為何沒人幫？",options:["太遠","失信","懶"],answer:1,moral:"寓意：說謊會失去他人的信任。"},

{title:"4. 獅子與老鼠",text:"獅子抓到老鼠，但老鼠懇求放過，並說將來會報答。獅子覺得可笑仍放了牠。後來獅子被網困住，老鼠咬斷繩子救牠。",q:"寓意？",options:["強最重要","小也有用","別幫人"],answer:1,moral:"寓意：再小的力量也能帶來幫助。"},

{title:"5. 烏鴉喝水",text:"烏鴉口渴找到瓶子，但水太低。牠沒有放棄，而是用石頭讓水位上升，最終喝到水。",q:"成功原因？",options:["運氣","智慧","力氣"],answer:1,moral:"寓意：動腦比蠻力更有效。"},

{title:"6. 北風與太陽",text:"北風與太陽比賽讓人脫外套。北風吹得越大，人越裹緊；太陽溫暖照射，人自然脫下。",q:"誰贏？",options:["北風","太陽","平手"],answer:1,moral:"寓意：溫和比強迫更有效。"},

{title:"7. 農夫與蛇",text:"農夫救了一條凍僵的蛇，但蛇甦醒後反咬他。農夫後悔自己幫錯對象。",q:"寓意？",options:["善良","壞人難改","勇敢"],answer:1,moral:"寓意：本性邪惡難以改變。"},

{title:"8. 螞蟻與蚱蜢",text:"螞蟻努力儲存食物，蚱蜢只顧玩樂。冬天來臨時，蚱蜢挨餓。",q:"重點？",options:["運氣","準備","強"],answer:1,moral:"寓意：要為未來做好準備。"},

{title:"9. 金斧頭銀斧頭",text:"誠實的樵夫得到三把斧頭，說謊的人反而失去一切。",q:"結果？",options:["失去","得到全部","懲罰"],answer:1,moral:"寓意：誠實會帶來好結果。"},

{title:"10. 狗與影子",text:"狗因貪心想要更多，結果連原本的也失去。",q:"原因？",options:["慢","貪心","運氣"],answer:1,moral:"寓意：貪心會失去一切。"},

{title:"11. 狼與小羊",text:"狼找藉口吃羊，不論真相如何。",q:"重點？",options:["羊錯","強欺弱","自然"],answer:1,moral:"寓意：強者常欺負弱者。"},

{title:"12. 兩隻青蛙",text:"青蛙提醒不要衝動跳井，要考慮未來風險。",q:"應該？",options:["衝動","思考","忽略"],answer:1,moral:"寓意：做事要三思而後行。"},

{title:"13. 驢子與獅子皮",text:"驢子假裝獅子嚇人，但聲音暴露真相。",q:"為何？",options:["慢","聲音","外表"],answer:1,moral:"寓意：虛假的外表無法長久。"},

{title:"14. 城市鼠與鄉下鼠",text:"城市生活富裕但危險，鄉下生活簡單但安全。",q:"重點？",options:["享受","安全","城市"],answer:1,moral:"寓意：平安比享受更重要。"},

{title:"15. 烏鴉與狐狸",text:"狐狸用讚美騙走食物。",q:"方法？",options:["力","讚美","威脅"],answer:1,moral:"寓意：不要輕信奉承。"},

{title:"16. 老人與死神",text:"老人抱怨人生，但真正面對死亡時仍害怕。",q:"寓意？",options:["抱怨","珍惜","放棄"],answer:1,moral:"寓意：人其實珍惜生命。"},

{title:"17. 馬與驢",text:"不願幫助他人，最後反而承擔更多。",q:"教訓？",options:["自私","幫助","競爭"],answer:1,moral:"寓意：幫助別人也是幫助自己。"},

{title:"18. 獅子與狐狸",text:"狐狸觀察腳印避免進入危險洞穴。",q:"原因？",options:["運氣","觀察","速度"],answer:1,moral:"寓意：細心觀察能避免危險。"},

{title:"19. 鷹與烏鴉",text:"烏鴉模仿鷹卻失敗，因能力不足。",q:"原因？",options:["慢","不自量力","運氣"],answer:1,moral:"寓意：要認清自己的能力。"},

{title:"20. 牧羊人與狼",text:"牧羊人養狼，最後被反咬一口。",q:"寓意？",options:["強","本性","弱"],answer:1,moral:"寓意：本性難改，不可輕信。"}
];

let index=0;
function render(){
 const s=stories[index];
 document.getElementById("app").innerHTML=`
 <div class='card'>
 <div class='progress'>第 ${index+1} / ${stories.length} 題</div>
 <h2>${s.title}</h2>
 <p>${s.text}</p>
 <p><b>${s.q}</b></p>
 ${s.options.map((o,i)=>`<div class='option' onclick='check(${i})'>${o}</div>`).join("")}
 <p id='result'></p>
 </div>`;
}

function check(i){
 const correct = stories[index].answer;
 const res = document.getElementById("result");
 if(i===correct){res.innerText = "✔ 正確\n" + stories[index].moral;}else{res.innerText = "✘ 錯誤\n" + stories[index].moral;}
}

function nextStory(){
 index=(index+1)%stories.length;
 render();
}

function prevStory(){
 index=(index-1+stories.length)%stories.length;
 render();
}

render();
</script>
</body>
</html>
