<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊索寓言閱讀理解完整版</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{max-width:800px;margin:auto;padding:16px}
.card{background:white;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.1);line-height:1.9}
button{padding:10px 16px;border:none;border-radius:8px;background:#4CAF50;color:white;margin:5px}
.option{display:block;margin:8px 0;padding:10px;background:#eee;border-radius:8px;cursor:pointer}
.progress{margin-bottom:10px;font-weight:bold}
.section{margin-top:12px}
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
<div style="text-align:center">
<button onclick="prevStory()">上一題</button>
<button onclick="nextStory()">下一題</button>
</div>
</div>

<script>
const stories = [
{
 title:"1. 狐狸與葡萄",
 text:"在炎熱的午後，一隻飢餓的狐狸在森林裡尋找食物。牠已經走了很久，卻什麼都沒有找到，肚子餓得咕咕叫。突然，牠發現一座葡萄架，上面掛滿了成熟的葡萄，看起來又甜又多汁。狐狸興奮地跳起來想摘，但葡萄太高了。牠試了很多次，用盡力氣，還是摘不到。最後牠累得放棄，並說：那些葡萄一定是酸的。",
 q1:"狐狸為什麼一直嘗試摘葡萄？",
 options1:["因為口渴","因為肚子餓","因為好玩"],
 a1:1,
 q2:"狐狸最後說葡萄酸的原因是？",
 options2:["真的酸","找藉口","不想吃"],
 a2:1,
 moral:"寓意：得不到時，人常會找理由安慰自己。"
},
{
 title:"2. 龜兔賽跑",
 text:"兔子總是嘲笑烏龜走得慢。烏龜提出比賽。兔子很快領先後，覺得一定會贏，就在路邊睡著了。烏龜一步一步持續前進，最後超越兔子，贏得比賽。",
 q1:"兔子為什麼會輸？",
 options1:["跑太慢","太驕傲","迷路"],
 a1:1,
 q2:"烏龜成功的關鍵是？",
 options2:["運氣","堅持","幫助"],
 a2:1,
 moral:"寓意：持之以恆比一時的優勢更重要。"
},
{
 title:"3. 狼來了",
 text:"牧童因無聊多次謊稱狼來了，村民上山幫忙卻被欺騙。最後真的有狼時，沒人相信他，羊群被吃光。",
 q1:"村民為什麼一開始會幫忙？",
 options1:["相信他","害怕","無聊"],
 a1:0,
 q2:"最後發生什麼事？",
 options2:["大家幫忙","沒人理他","狼走了"],
 a2:1,
 moral:"寓意：說謊會失去信任。"
},
{title:"4. 獅子與老鼠",text:"有一天，一隻獅子在森林裡吃飽後，躺在樹蔭下舒服地睡著了。這時，一隻小老鼠在草叢中跑來跑去，不小心爬到了獅子的身上，把獅子吵醒了。獅子非常生氣，一把抓住老鼠，準備把牠吃掉。老鼠嚇得發抖，連忙求饒說：請放過我吧！也許有一天我能幫助你。獅子聽了覺得很好笑，但還是心軟放了牠。過了幾天，獅子不小心掉進獵人設下的網子裡，怎麼掙扎都逃不出來，只能大聲吼叫。老鼠聽到聲音趕來，認出是曾經救過自己的獅子，於是用尖利的牙齒一點一點咬斷繩索，最後成功救出了獅子。",q1:"獅子一開始為何放過老鼠？",options1:["覺得可笑","害怕","不餓"],a1:0,q2:"老鼠如何幫助獅子？",options2:["叫人","咬網","推開"],a2:1,moral:"寓意：再小的力量也能發揮重要作用。"},

{title:"5. 烏鴉喝水",text:"在炎熱的夏天，一隻烏鴉飛了很久，口渴得受不了。牠四處尋找水源，終於找到一個瓶子，裡面還有一些水。烏鴉非常高興地飛過去，但很快發現瓶口太窄、水位太低，自己的嘴巴根本伸不進去。牠試著推倒瓶子或用嘴巴去撈水，但都失敗了。烏鴉並沒有放棄，而是停下來觀察四周，思考解決方法。最後牠想到一個辦法，撿起地上的小石頭，一顆一顆丟進瓶子裡。隨著石頭越來越多，水面慢慢上升，最後烏鴉終於成功喝到了水。",q1:"水一開始為何喝不到？",options1:["太熱","太少","太髒"],a1:1,q2:"烏鴉怎麼解決問題？",options2:["推倒瓶子","用石頭","飛走"],a2:1,moral:"寓意：遇到困難要動腦思考。"},

{title:"6. 北風與太陽",text:"北風和太陽常常爭論誰比較有力量。有一天，牠們看到一個旅人正走在路上，身上穿著厚重的外套。於是牠們決定比賽，看誰能讓旅人把外套脫下來。北風先開始，牠用力吹出強烈的冷風，希望把外套吹掉。但風越大，旅人反而覺得越冷，把外套裹得更緊。接著輪到太陽，牠溫暖地照耀著大地，讓氣溫逐漸升高。旅人覺得越來越熱，最後忍不住把外套脫了下來。太陽因此贏得了比賽。",q1:"北風為什麼失敗？",options1:["太弱","太強","太冷"],a1:1,q2:"太陽如何成功？",options2:["吹風","溫暖","下雨"],a2:1,moral:"寓意：溫和的方法比強迫更有效。"},

{title:"7. 農夫與蛇",text:"寒冷的冬天，一位農夫在回家的路上看到一條蛇凍僵在雪地裡，幾乎沒有生命跡象。農夫心想牠也是一條生命，於是起了憐憫之心，把蛇抱進懷裡，用自己的體溫溫暖牠。過了一會兒，蛇慢慢甦醒過來，但一恢復意識，就露出兇狠的本性，立刻咬了農夫一口。農夫中毒倒地，在臨死前後悔地說：我不該幫助本性邪惡的東西。",q1:"農夫為什麼救蛇？",options1:["善良","好玩","餓"],a1:0,q2:"結果如何？",options2:["被救","被咬","逃走"],a2:1,moral:"寓意：本性邪惡的人很難改變。"},

{title:"8. 螞蟻與蚱蜢",text:"在炎熱的夏天，螞蟻忙著搬運食物，一點一滴地儲存起來，為寒冷的冬天做準備。牠們每天辛苦工作，從不偷懶。另一邊，蚱蜢卻在草地上唱歌跳舞，享受陽光，完全不擔心未來。當冬天來臨，大地被冰雪覆蓋，蚱蜢找不到任何食物，只好挨餓。牠最後只能去向螞蟻求助，但螞蟻告訴牠：你夏天不努力，現在就要承擔後果。",q1:"螞蟻在做什麼？",options1:["玩","儲糧","睡覺"],a1:1,q2:"蚱蜢最後怎樣？",options2:["成功","挨餓","快樂"],a2:1,moral:"寓意：要為未來做好準備。"},

{title:"9. 金斧頭銀斧頭",text:"一位樵夫在河邊砍柴時，不小心把斧頭掉進水裡。他非常著急，因為那是他唯一的工具。這時河神出現，先拿出一把金斧頭問是不是他的，樵夫誠實地說不是。接著又拿出銀斧頭，他也否認。最後河神拿出他的鐵斧，樵夫高興地承認。河神被他的誠實感動，便把三把斧頭都送給他。而另一個人模仿卻說謊，結果什麼都沒有得到。",q1:"樵夫怎麼回答？",options1:["誠實","說謊","逃走"],a1:0,q2:"結果如何？",options2:["沒得","全得","被罰"],a2:1,moral:"寓意：誠實會得到回報。"},

{title:"10. 狗與影子",text:"一隻狗叼著一塊肉，開心地走在回家的路上。當牠經過一座橋時，低頭看到水中有一隻狗，嘴裡似乎叼著更大的一塊肉。牠不知道那只是自己的倒影，心想如果能搶過來就更好了。於是牠張開嘴巴想去搶，結果原本叼著的肉掉進水裡，被水流沖走，最後什麼都沒有得到。",q1:"狗看到什麼？",options1:["影子","魚","人"],a1:0,q2:"為什麼失去肉？",options2:["慢","貪心","壞運"],a2:1,moral:"寓意：貪心會讓人失去原本擁有的東西。"},

{title:"11. 狼與小羊",text:"一隻小羊在河邊喝水，一隻飢餓的狼看見牠，想找理由吃掉牠。狼先說小羊把水弄髒，小羊解釋水是從上游流下來的，不可能影響到狼。狼又說小羊以前罵過牠，小羊說自己還沒出生。無論小羊怎麼解釋，狼都不理會，最後還是撲上去把牠吃掉。",q1:"狼在做什麼？",options1:["幫助","找藉口","逃走"],a1:1,q2:"最後結果如何？",options2:["和平","被吃","逃走"],a2:1,moral:"寓意：強者常會欺負弱者。"},

{title:"12. 兩隻青蛙",text:"兩隻青蛙在乾旱的季節到處找水，牠們發現一口井，裡面還有一些水。其中一隻青蛙想立刻跳下去生活，但另一隻提醒說：如果我們跳下去後水乾了，就再也爬不出來了。我們應該先想清楚後果再決定。",q1:"一隻青蛙建議什麼？",options1:["跳","想清楚","離開"],a1:1,q2:"故事重點是？",options2:["衝動","思考","玩"],a2:1,moral:"寓意：做事要三思而後行。"},

{title:"13. 驢子與獅子皮",text:"一隻驢子撿到一張獅子皮，披在身上跑到森林裡嚇唬其他動物。動物們一開始都以為是真的獅子，嚇得四處逃跑。但當驢子忍不住開口大叫時，熟悉的驢叫聲立刻暴露了牠的真面目，大家不再害怕，反而嘲笑牠。",q1:"為何一開始成功？",options1:["外表","聲音","速度"],a1:0,q2:"為何最後失敗？",options2:["聲音","慢","小"],a2:0,moral:"寓意：虛假的外表無法長久隱藏真相。"},

{title:"14. 城市鼠與鄉下鼠",text:"城市老鼠邀請鄉下老鼠來家裡做客，餐桌上擺滿了豐盛的食物。但每當牠們準備享用時，就會有人類出現，讓牠們驚慌逃跑。經過幾次驚嚇後，鄉下老鼠說：雖然你這裡食物很多，但我寧願回到安全又簡單的鄉下生活。",q1:"城市生活如何？",options1:["安全","危險","無聊"],a1:1,q2:"鄉下優點是？",options2:["安全","多食","熱鬧"],a2:0,moral:"寓意：安全比享受更重要。"},

{title:"15. 烏鴉與狐狸",text:"一隻烏鴉叼著一塊肉停在樹上，狐狸看到後很想得到。牠沒有直接搶，而是開始稱讚烏鴉的美麗和歌聲。烏鴉聽了非常高興，忍不住張開嘴唱歌，結果肉掉了下來，被狐狸叼走。",q1:"狐狸用什麼方法？",options1:["力","讚美","打"],a1:1,q2:"烏鴉為何失敗？",options2:["聰明","自滿","快"],a2:1,moral:"寓意：不要輕信別人的奉承。"},

{title:"16. 老人與死神",text:"一位老人每天背著沉重的柴火上山下山，感到非常疲憊。他忍不住抱怨生活太辛苦，甚至呼喚死神帶走自己。沒想到死神真的出現了，問他有什麼願望。老人嚇了一跳，連忙說：請幫我把柴火搬起來就好。",q1:"老人做了什麼？",options1:["呼喚死神","跑","睡"],a1:0,q2:"最後怎麼做？",options2:["死","改口","逃"],a2:1,moral:"寓意：人其實很珍惜生命。"},

{title:"17. 馬與驢",text:"一匹馬和一頭驢一起運送貨物。驢子背負沉重的負擔，請求馬幫忙分擔一點，但馬拒絕了。走了一段路後，驢子因為太累而倒下，主人只好把所有貨物搬到馬身上，結果馬反而承受更大的重量。",q1:"驢子請求什麼？",options1:["幫忙","跑","吃"],a1:0,q2:"最後結果如何？",options2:["更輕","更重","一樣"],a2:1,moral:"寓意：幫助別人其實也是幫助自己。"},

{title:"18. 獅子與狐狸",text:"一隻年老的獅子躲在洞裡，假裝生病，吸引其他動物來探望，再趁機捕食。許多動物進去後都沒有再出來。狐狸來到洞口時，觀察到地上只有進去的腳印，沒有出來的腳印，因此判斷有危險，決定離開。",q1:"狐狸看到什麼？",options1:["腳印","食物","水"],a1:0,q2:"牠怎麼做？",options2:["進去","離開","叫"],a2:1,moral:"寓意：觀察細節可以避免危險。"},

{title:"19. 鷹與烏鴉",text:"一隻烏鴉看到老鷹輕鬆抓走一隻羊，心想自己也可以做到。牠模仿老鷹飛下去抓羊，但因為力量不足，反而被羊毛纏住，無法飛起來，最後被牧羊人抓住。",q1:"烏鴉做了什麼？",options1:["模仿","飛走","睡"],a1:0,q2:"為何失敗？",options2:["不自量力","慢","天氣"],a2:0,moral:"寓意：要了解自己的能力。"},

{title:"20. 牧羊人與狼",text:"一位牧羊人撿到一隻小狼，覺得牠很可憐，便帶回家和羊群一起養。牠以為只要從小飼養，狼就會變得溫順。但當狼長大後，仍然保有掠食的本性，趁夜晚咬死了許多羊。牧羊人這才後悔當初的決定。",q1:"牧羊人做了什麼？",options1:["養狼","殺狼","放狼"],a1:0,q2:"最後結果如何？",options2:["成功","被害","沒事"],a2:1,moral:"寓意：本性難改，不可輕信。"}
];

let index=0;
function render(){
 const s=stories[index];
 document.getElementById("app").innerHTML=`
 <div class='card'>
 <div class='progress'>第 ${index+1} / ${stories.length} 題</div>
 <h2>${s.title}</h2>
 <p>${s.text}</p>
 <div class='section'><b>問題1：</b>${s.q1}</div>
 ${s.options1.map((o,i)=>`<div class='option' onclick='check1(${i})'>${o}</div>`).join("")}
 <div class='section'><b>問題2：</b>${s.q2}</div>
 ${s.options2.map((o,i)=>`<div class='option' onclick='check2(${i})'>${o}</div>`).join("")}
 <p id='result'></p>
 </div>`;
}

function check1(i){
 const res = document.getElementById("result");
 res.innerText = (i===stories[index].a1?"✔ 問題1正確\n":"✘ 問題1錯誤\n") + stories[index].moral;
}

function check2(i){
 const res = document.getElementById("result");
 res.innerText = (i===stories[index].a2?"✔ 問題2正確\n":"✘ 問題2錯誤\n") + stories[index].moral;
}

function nextStory(){index=(index+1)%stories.length;render();}
function prevStory(){index=(index-1+stories.length)%stories.length;render();}

render();
</script>
</body>
</html>
