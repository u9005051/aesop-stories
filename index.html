<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊索寓言互動故事</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{max-width:600px;margin:auto;padding:16px}
.card{background:white;border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
button{padding:10px 16px;border:none;border-radius:8px;background:#4CAF50;color:white}
.option{display:block;margin:8px 0;padding:10px;background:#eee;border-radius:8px;cursor:pointer}
img{width:100%;border-radius:10px;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
<button onclick="nextStory()">下一題</button>
</div>

<script>
const stories = [
{
 title:"7. 農夫與蛇",

 options:["要善良","壞人難改","不要幫人"],

 q:"螞蟻成功原因？",
 options:["運氣","勤勞準備","比較強"],
 answer:1

 q:"故事重點？",
 options:["小羊錯","強者欺弱","水太髒"],

 q:"應該怎麼做？",
 options:["衝動","深思熟慮","不管"],

},

{

 q:"寓意？",
 options:["愛抱怨","珍惜生命","想死"],

 q:"教訓？",
 options:["自私好","互相幫助","跑快"],
 answer:1
},
{
 title:"18. 獅子與狐狸",

 q:"狐狸為何安全？",
 options:["幸運","觀察力","跑快"],
 answer:1
},
{
 title:"19. 鷹與烏鴉",
 img:"https://picsum.photos/seed/eagle/600/300",
 text:"一隻烏鴉看到老鷹輕鬆抓走一隻羊，心想自己也能做到。牠模仿老鷹飛下去抓羊，但因為力量不足，反而被羊毛纏住，無法飛起來，最後被牧羊人抓住。",
 q:"原因？",
 options:["太慢","不自量力","風大"],
 answer:1
},
{
 title:"20. 牧羊人與狼",
 img:"https://picsum.photos/seed/sheep/600/300",
 text:"一位牧羊人撿到一隻小狼，心想只要好好養育，牠就會變得溫順。於是把牠帶回家和羊群一起養。沒想到狼長大後，仍然保持本性，趁夜晚咬死許多羊。牧羊人這才後悔當初的決定。",
 q:"寓意？",
 options:["狼強","不要養壞人","羊弱"],
 answer:1
}
];

let index=0;
function render(){
 const s=stories[index];
 document.getElementById("app").innerHTML=`
 <div class='card'>
 <h2>${s.title}</h2>
 <img src='${s.img}'>
 <p>${s.text}</p>
 <p><b>${s.q}</b></p>
 ${s.options.map((o,i)=>`<div class='option' onclick='check(${i})'>${o}</div>`).join("")}
 <p id='result'></p>
 </div>`;
}

function check(i){
 const correct = stories[index].answer;
 document.getElementById("result").innerText = i===correct?"✔ 正確":"✘ 錯誤";
}

function nextStory(){
 index=(index+1)%stories.length;
 render();
}

render();
</script>
</body>
</html>
