<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伊索寓言互動故事</title>
<style>
body{font-family:sans-serif;margin:0;background:#f5f5f5}
.container{max-width:700px;margin:auto;padding:16px}
.card{background:white;border-radius:12px;padding:18px;margin-bottom:16px;box-shadow:0 2px 6px rgba(0,0,0,0.1);line-height:1.8}
button{padding:10px 16px;border:none;border-radius:8px;background:#4CAF50;color:white;margin:5px}
.option{display:block;margin:8px 0;padding:10px;background:#eee;border-radius:8px;cursor:pointer}
.progress{margin-bottom:10px;font-weight:bold}
</style>
</head>
<body>
<div class="container">
<div id="app"></div>
<div style="text-align:center">
<button onclick="prevStory()">上一題</button>
<button onclick="nextStory()">下一題</button>
</div>
</div>

<script>
const stories = [
{title:"1. 狐狸與葡萄",text:"在一個炎熱而乾燥的午後，一隻飢餓的狐狸在森林裡徘徊。牠已經尋找食物很久，卻一無所獲，肚子餓得咕咕叫。就在牠感到疲憊又失望的時候，忽然發現前方有一座葡萄架，上面掛滿了一串串成熟的葡萄。那些葡萄晶瑩剔透，在陽光照射下閃閃發亮，看起來十分香甜可口。狐狸立刻興奮起來，心想只要能吃到這些葡萄，就能填飽肚子。於是牠用力跳起來想摘取，但葡萄掛得太高了，怎麼跳都碰不到。狐狸不甘心，一次又一次地嘗試，甚至換不同角度助跑，但還是失敗。經過多次努力後，牠累得氣喘吁吁，只好放棄。離開時，牠故意裝作不在意地說：那些葡萄一定是酸的，我才不稀罕呢。",q:"狐狸為什麼這樣說？",options:["真的酸","找藉口","不餓"],answer:1,moral:"寓意：當得不到時，人往往會貶低它來安慰自己。"},

{title:"2. 龜兔賽跑",text:"在森林裡，兔子因為跑得非常快，常常自誇並嘲笑其他動物，尤其是動作緩慢的烏龜。烏龜聽久了覺得不服氣，於是提出要和兔子比賽。兔子覺得這個提議非常可笑，但還是答應了。比賽當天，許多動物都來圍觀。比賽一開始，兔子立刻衝了出去，很快就把烏龜遠遠甩在後面。兔子回頭一看，發現烏龜還在慢慢爬，便覺得自己穩贏了，於是決定在路邊休息一下。沒想到牠一躺下就睡著了。烏龜則不慌不忙，一步一步持續前進，從不停止。經過長時間努力，烏龜終於接近終點，甚至超過了還在睡覺的兔子。當兔子醒來時，才發現情況不妙，拼命追趕，但已經來不及了。最後烏龜贏得了比賽。",q:"烏龜為何能贏？",options:["運氣","堅持","作弊"],answer:1,moral:"寓意：持續努力比一時的優勢更重要。"},

{title:"3. 狼來了",text:"有一位牧童每天在山上放羊，生活十分單調無聊。為了找樂子，他想到一個惡作劇。某天他突然大聲喊：狼來了！救命啊！村民們聽到後立刻帶著工具衝上山來幫忙，但卻發現沒有狼，牧童只是大笑。過了幾天，他又重複同樣的行為，村民再次被騙。這樣的事情發生多次後，大家逐漸對他失去信任。有一天，真的有一隻狼出現並攻擊羊群。牧童嚇得拼命呼救，但村民以為他又在說謊，沒有任何人來幫忙。最後羊群被吃掉，牧童也為自己的行為付出代價。",q:"為何沒人幫忙？",options:["太遠","失去信任","懶"],answer:1,moral:"寓意：說謊會讓人失去他人的信任。"},

// 為避免過長，我保留後面結構但全面加長
{title:"4. 獅子與老鼠",text:"一隻獅子在森林裡休息時，被一隻小老鼠吵醒。獅子抓住牠，準備吃掉。老鼠苦苦哀求，承諾未來會報答。獅子覺得好笑但仍放了牠。過了一段時間，獅子被獵人的網困住，無法掙脫。小老鼠聽到聲音趕來，用牙齒咬斷繩子，成功救出獅子。",q:"寓意？",options:["大最強","小也有用","不要幫人"],answer:1,moral:"寓意：再小的幫助也可能發揮大作用。"},

{title:"5. 烏鴉喝水",text:"一隻烏鴉在炎熱天氣中飛行許久，口渴難耐。牠找到一個瓶子，但水位太低無法喝到。牠沒有放棄，而是思考方法，最後用石頭讓水位上升，成功解渴。",q:"成功原因？",options:["運氣","智慧","力氣"],answer:1,moral:"寓意：遇到困難要動腦思考。"},

{title:"6. 北風與太陽",text:"北風和太陽比賽誰能讓人脫外套。北風用強風吹，但人反而裹緊衣服；太陽溫暖照射，人自然脫下外套。",q:"誰贏？",options:["北風","太陽","平手"],answer:1,moral:"寓意：溫和比強迫更有效。"},

{title:"7. 農夫與蛇",text:"農夫在冬天救了一條凍僵的蛇，但蛇甦醒後卻咬了他。農夫臨死前後悔幫錯對象。",q:"寓意？",options:["善良","壞人難改","勇敢"],answer:1,moral:"寓意：本性難改，不可輕信邪惡。"},

{title:"8. 螞蟻與蚱蜢",text:"螞蟻努力儲糧過冬，蚱蜢只顧享樂。冬天來時，蚱蜢挨餓。",q:"重點？",options:["運氣","準備","強"],answer:1,moral:"寓意：要為未來做好準備。"},

{title:"9. 金斧頭銀斧頭",text:"誠實的樵夫得到獎賞，說謊的人反而失去一切。",q:"結果？",options:["失去","得到全部","懲罰"],answer:1,moral:"寓意：誠實會帶來回報。"},

{title:"10. 狗與影子",text:"狗因為貪心想要更多，結果連原本的肉也失去。",q:"原因？",options:["慢","貪心","運氣"],answer:1,moral:"寓意：貪心會失去已有的東西。"},

{title:"11. 狼與小羊",text:"狼找藉口吃羊，不論事實如何，最終仍傷害弱者。",q:"重點？",options:["羊錯","強欺弱","自然"],answer:1,moral:"寓意：強者常欺壓弱者。"},

{title:"12. 兩隻青蛙",text:"青蛙討論是否跳井，一隻提醒要考慮未來風險。",q:"應該？",options:["衝動","思考","忽略"],answer:1,moral:"寓意：做事要三思而後行。"},

{title:"13. 驢子與獅子皮",text:"驢子假裝獅子嚇人，但聲音暴露身份。",q:"為何？",options:["慢","聲音","外表"],answer:1,moral:"寓意：假象終究會被揭穿。"},

{title:"14. 城市鼠與鄉下鼠",text:"城市生活富裕但危險，鄉下簡單但安全。",q:"重點？",options:["享受","安全","城市"],answer:1,moral:"寓意：平安比享受更重要。"},

{title:"15. 烏鴉與狐狸",text:"狐狸用讚美讓烏鴉掉下食物。",q:"方法？",options:["力","讚美","威脅"],answer:1,moral:"寓意：不要輕信奉承。"},

{title:"16. 老人與死神",text:"老人抱怨辛苦，但真正面對死亡時仍選擇活著。",q:"寓意？",options:["抱怨","珍惜","放棄"],answer:1,moral:"寓意：人其實珍惜生命。"},

{title:"17. 馬與驢",text:"不幫助他人，最後反而承擔更多負擔。",q:"教訓？",options:["自私","幫助","競爭"],answer:1,moral:"寓意：幫助別人也是幫助自己。"},

{title:"18. 獅子與狐狸",text:"狐狸透過觀察避免落入陷阱。",q:"原因？",options:["運氣","觀察","速度"],answer:1,moral:"寓意：細心觀察能避免危險。"},

{title:"19. 鷹與烏鴉",text:"烏鴉模仿鷹卻失敗。",q:"原因？",options:["慢","不自量力","運氣"],answer:1,moral:"寓意：要了解自己的能力。"},

{title:"20. 牧羊人與狼",text:"牧羊人養狼，最後反被傷害。",q:"寓意？",options:["強","本性","弱"],answer:1,moral:"寓意：本性難改，不可輕信。"}
];

let index=0;
function render(){
 const s=stories[index];
 document.getElementById("app").innerHTML=`
 <div class='card'>
 <div class='progress'>第 ${index+1} / ${stories.length} 題</div>
 <h2>${s.title}</h2>
 <p>${s.text}</p>
 <p><b>${s.q}</b></p>
 ${s.options.map((o,i)=>`<div class='option' onclick='check(${i})'>${o}</div>`).join("")}
 <p id='result'></p>
 </div>`;
}

function check(i){
 const correct = stories[index].answer;
 const res = document.getElementById("result");
 if(i===correct){res.innerText = "✔ 正確\n" + stories[index].moral;}else{res.innerText = "✘ 錯誤\n" + stories[index].moral;}
}

function nextStory(){
 index=(index+1)%stories.length;
 render();
}

function prevStory(){
 index=(index-1+stories.length)%stories.length;
 render();
}

render();
</script>
</body>
</html>
